name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            runner: ubuntu-24.04
            os: linux
            arch: amd64
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - label: macos-arm64
            runner: macos-latest
            os: macos
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gradle_version=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$gradle_version" != "$VERSION" ]; then
            echo "::error::gradle.properties version ($gradle_version) does not match tag ($VERSION)"
            exit 1
          fi
          pkg_version=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' frontend/package.json | head -1)
          if [ "$pkg_version" != "$VERSION" ]; then
            echo "::error::frontend/package.json version ($pkg_version) does not match tag ($VERSION)"
            exit 1
          fi

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@186d0493a2df5eb62df5ecc498883d18fd58c303  # v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      # Runs both test suites (frontend jest + backend JUnit) and the frontend export, then
      # compiles the backend (with the UI embedded) to a native image.
      - name: Build, test, and native-compile
        run: ./gradlew build :backend:nativeCompile

      - name: Smoke-check embedded UI
        run: test -f frontend/out/index.html

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          cd artifacts
          cp ../backend/build/native/nativeCompile/orchard-ui-backend .
          tar czf orchard-ui-backend-${{ matrix.os }}-${{ matrix.arch }}.tar.gz orchard-ui-backend
          rm orchard-ui-backend

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-${{ matrix.label }}
          path: artifacts/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          generate_release_notes: true
          files: |
            orchard-ui-backend-linux-amd64.tar.gz
            orchard-ui-backend-linux-arm64.tar.gz
            orchard-ui-backend-macos-arm64.tar.gz
            checksums-sha256.txt
