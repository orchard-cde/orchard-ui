name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish native binary (linux/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches gradle.properties
        run: |
          gradle_version=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$gradle_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::gradle.properties version ($gradle_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38  # v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Builds the :frontend export and compiles the backend (with the UI embedded) to a native image.
      - name: Build native binary
        run: ./gradlew :backend:nativeCompile

      - name: Package binary
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ARCH=${{ matrix.arch }}
          ASSET="orchard-ui-backend-${VERSION}-linux-${ARCH}"
          cp backend/build/native/nativeCompile/orchard-ui-backend "$ASSET"
          sha256sum "$ASSET" > "${ASSET}.sha256"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          generate_release_notes: true
          files: |
            orchard-ui-backend-*-linux-${{ matrix.arch }}
            orchard-ui-backend-*-linux-${{ matrix.arch }}.sha256
