name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Bump version to ${{ inputs.version }} and tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be semver without a leading v (e.g. 0.2.0)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "v${{ inputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ inputs.version }} already exists on the remote"
            exit 1
          fi

      - name: Bump versions
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/^version=.*/version=${VERSION}/" gradle.properties
          # Update "version": "..." — first occurrence only (the package version field)
          sed -i "0,/\"version\": \"[^\"]*\"/{s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/}" frontend/package.json

      - name: Commit and push version bump
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties frontend/package.json
          if git diff --cached --quiet; then
            echo "Version files already at ${VERSION} — skipping bump commit"
          else
            git commit -m "chore: bump version to ${VERSION}"
            git push origin main
          fi

      - name: Create and push tag
        run: |
          VERSION="${{ inputs.version }}"
          git tag -a "v${VERSION}" -m "v${VERSION}"
          git push origin "v${VERSION}"
